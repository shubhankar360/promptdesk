<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PromptDesk — Analytics</title>
<style>
  :root { --bg:#0f1220; --panel:#181c30; --accent:#6c7bff; --text:#e8eaf6; --muted:#8b90ad; }
  * { box-sizing:border-box; margin:0; }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); padding:24px; }
  header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
  h1 { font-size:20px; } h1 span { color:var(--accent); }
  a { color:var(--muted); text-decoration:none; } a:hover { color:var(--accent); }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:28px; }
  .card { background:var(--panel); border:1px solid #262b47; border-radius:14px; padding:20px; }
  .card .num { font-size:32px; font-weight:700; color:var(--accent); }
  .card .label { color:var(--muted); font-size:13px; margin-top:4px; }
  h2 { font-size:16px; margin:20px 0 12px; color:var(--muted); }
  .bar-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; font-size:14px; }
  .bar-row .name { width:90px; color:var(--muted); }
  .bar { height:18px; border-radius:6px; background:var(--accent); min-width:4px; }
  .bar.frustrated, .bar.angry { background:#e0557a; }
  .bar.positive { background:#3ecf8e; }
  table { width:100%; border-collapse:collapse; background:var(--panel); border-radius:14px; overflow:hidden; }
  th, td { padding:10px 14px; text-align:left; font-size:14px; border-bottom:1px solid #262b47; }
  th { color:var(--muted); font-weight:600; }
</style>
</head>
<body>
<header>
  <h1>Prompt<span>Desk</span> · Analytics</h1>
  <a href="/">← Back to chat</a>
</header>
<div class="cards" id="cards"></div>
<h2>Sentiment breakdown (user messages)</h2>
<div id="sentiment"></div>
<h2>Support tickets</h2>
<table>
  <thead><tr><th>Ticket</th><th>Category</th><th>Priority</th><th>Reason</th><th>Status</th><th>Created</th></tr></thead>
  <tbody id="tickets"></tbody>
</table>
<script>
async function load() {
  const a = await (await fetch('/api/analytics')).json();
  document.getElementById('cards').innerHTML = [
    [a.conversations, 'Conversations'],
    [a.user_messages, 'User messages'],
    [a.tickets, 'Tickets created'],
    [a.escalation_rate_pct + '%', 'Escalation rate'],
    [a.provider, 'LLM provider'],
  ].map(([n, l]) => `<div class="card"><div class="num">${n}</div><div class="label">${l}</div></div>`).join('');

  const total = Object.values(a.sentiment_breakdown).reduce((x, y) => x + y, 0) || 1;
  document.getElementById('sentiment').innerHTML =
    ['positive','neutral','frustrated','angry'].map(k => {
      const v = a.sentiment_breakdown[k] || 0;
      return `<div class="bar-row"><div class="name">${k}</div>` +
             `<div class="bar ${k}" style="width:${(v/total)*100 * 6}px"></div><div>${v}</div></div>`;
    }).join('');

  const tickets = await (await fetch('/api/tickets')).json();
  document.getElementById('tickets').innerHTML = tickets.length
    ? tickets.map(t => `<tr><td>${t.id}</td><td>${t.category}</td><td>${t.priority}</td><td>${t.reason}</td><td>${t.status}</td><td>${t.created_at.slice(0,19).replace('T',' ')}</td></tr>`).join('')
    : '<tr><td colspan="6" style="color:var(--muted)">No tickets yet.</td></tr>';
}
load();
setInterval(load, 10000);
</script>
</body>
</html>
