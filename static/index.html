<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PromptDesk — CloudCart Support</title>
<style>
  :root { --bg:#0f1220; --panel:#181c30; --accent:#6c7bff; --text:#e8eaf6; --muted:#8b90ad; }
  * { box-sizing:border-box; margin:0; }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; }
  header { padding:16px 24px; background:var(--panel); display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #262b47; }
  header h1 { font-size:18px; } header h1 span { color:var(--accent); }
  header a { color:var(--muted); text-decoration:none; font-size:14px; }
  header a:hover { color:var(--accent); }
  #chat { flex:1; overflow-y:auto; padding:24px; max-width:820px; width:100%; margin:0 auto; }
  .msg { max-width:75%; padding:12px 16px; border-radius:14px; margin-bottom:12px; line-height:1.5; font-size:15px; white-space:pre-wrap; }
  .user { background:var(--accent); color:#fff; margin-left:auto; border-bottom-right-radius:4px; }
  .bot  { background:var(--panel); border:1px solid #262b47; border-bottom-left-radius:4px; }
  .meta { font-size:11px; color:var(--muted); margin:-6px 0 14px 4px; }
  .meta b { color:var(--accent); }
  .badge { display:inline-block; padding:1px 8px; border-radius:10px; font-size:11px; margin-right:6px; background:#262b47; }
  .badge.angry, .badge.frustrated { background:#5c2333; color:#ff9db1; }
  .badge.positive { background:#1e4032; color:#7ee2b8; }
  .ticket { background:#3a2b12; color:#ffcf87; }
  form { display:flex; gap:10px; padding:18px 24px; max-width:820px; width:100%; margin:0 auto; }
  input { flex:1; padding:13px 16px; border-radius:12px; border:1px solid #262b47; background:var(--panel); color:var(--text); font-size:15px; outline:none; }
  input:focus { border-color:var(--accent); }
  button { padding:0 22px; border:none; border-radius:12px; background:var(--accent); color:#fff; font-size:15px; cursor:pointer; }
  button:disabled { opacity:.5; }
</style>
</head>
<body>
<header>
  <h1>Prompt<span>Desk</span> · CloudCart Support</h1>
  <a href="/dashboard">Analytics →</a>
</header>
<div id="chat">
  <div class="msg bot">Hi! I'm Aria, CloudCart's support assistant. Ask me about shipping, returns, billing, or your account. 👋</div>
</div>
<form id="form">
  <input id="input" placeholder="Type your message…" autocomplete="off" required>
  <button id="send">Send</button>
</form>
<script>
let conversationId = null;
const chat = document.getElementById('chat');
const form = document.getElementById('form');
const input = document.getElementById('input');
const send = document.getElementById('send');

function add(cls, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  el.textContent = text;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const message = input.value.trim();
  if (!message) return;
  add('user', message);
  input.value = '';
  send.disabled = true;
  const thinking = add('bot', '…');
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, conversation_id: conversationId })
    });
    const data = await res.json();
    conversationId = data.conversation_id;
    thinking.textContent = data.reply;
    const meta = document.createElement('div');
    meta.className = 'meta';
    let html = `<span class="badge ${data.sentiment}">${data.sentiment}</span>` +
               `<span class="badge">${data.intent}</span>`;
    if (data.sources.length) html += ` sources: <b>${data.sources.join(', ')}</b>`;
    if (data.escalated) html += ` <span class="badge ticket">⚠ escalated · ${data.ticket_id}</span>`;
    meta.innerHTML = html;
    chat.appendChild(meta);
    chat.scrollTop = chat.scrollHeight;
  } catch (err) {
    thinking.textContent = 'Error contacting server.';
  } finally {
    send.disabled = false;
    input.focus();
  }
});
</script>
</body>
</html>
